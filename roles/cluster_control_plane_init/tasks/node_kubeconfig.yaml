---
- name: Ensure .kube directory exists
  delegate_to: "{{ item.name }}"
  ansible.builtin.file:
    path: ~/.kube
    state: directory
    mode: "0700"

- name: Create local kubernetes config
  delegate_to: "{{ item.name }}"
  ansible.builtin.copy:
    content: "{{ slurpfile.content | b64decode }}"
    dest: ~/.kube/config
    mode: "0700"
